<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AGORAFLUX</title>
  <style>
    :root{--text:#e7ecf5;--muted:#a9b4c7;--border:rgba(255,255,255,.10)}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial;background:linear-gradient(180deg,#070a12,#0b0f17);color:var(--text)}
    header{position:sticky;top:0;z-index:10;backdrop-filter:blur(10px);background:rgba(11,15,23,.78);border-bottom:1px solid var(--border)}
    .wrap{max-width:1200px;margin:0 auto;padding:12px 16px}
    h1{margin:0;text-align:center;font-size:20px;letter-spacing:.03em}
    main{max-width:1200px;margin:0 auto;padding:10px 16px 24px;display:grid;gap:14px}
    .panel{background:rgba(18,26,41,.75);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .hd{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .bd{padding:12px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .searchbar{justify-content:center;width:100%}
    input,select,button{background:#0c1220;color:var(--text);border:1px solid var(--border);padding:10px 11px;border-radius:12px;font:inherit}
    button{cursor:pointer}
    button.primary{background:linear-gradient(180deg,rgba(106,166,255,.25),rgba(106,166,255,.12));border-color:rgba(106,166,255,.35)}
    .badge{font-size:12px;color:var(--muted);border:1px solid var(--border);padding:6px 10px;border-radius:999px}
    .small{font-size:12px;color:var(--muted)}
    .filters,.sources{display:flex;flex-wrap:wrap;gap:10px}
    .filter,.src{font-size:13px;color:var(--muted);display:flex;gap:6px;align-items:center}
    .articles{display:grid;gap:10px}
    article{background:rgba(12,18,32,.6);border:1px solid var(--border);border-radius:14px;padding:12px}
    article h3{margin:0 0 6px 0;font-size:15px}
    .meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:12px}
    .snippet{margin-top:8px;color:#d7def0;font-size:14px;line-height:1.4}
    .country-fields{display:grid;gap:7px;font-size:13px;line-height:1.4}
    .country-fields dt{font-weight:700;color:#cfe1ff}
    .country-fields dd{margin:2px 0 8px;color:#d7def0}
    .country-fields ul{margin:6px 0 10px 18px;padding:0}
    .section-title{font-weight:700;color:#cfe1ff;margin-top:8px}
    a{color:#cfe1ff}
  </style>
</head>
<body>
<header><div class="wrap"><h1>AGORAFLUX</h1></div></header>

<main>
  <section class="panel">
    <div class="hd">
      <div class="row"><span class="badge" id="status">Prêt</span><span class="small" id="count"></span></div>
      <div class="row searchbar">
        <input id="q" type="search" placeholder='Ex: Groenland | cybersécurité | OTAN arctique' style="min-width:360px; width:min(640px, 100%)"/>
        <button class="primary" id="searchBtn">Rechercher</button>
      </div>
    </div>
    <div class="bd">
      <div class="filters" id="continentFilters"></div>
      <div class="sources" id="sourceToggles"></div>
      <div style="height:10px"></div>
      <div class="articles" id="articles"></div>
    </div>
  </section>

  <section class="panel">
    <div class="hd">
      <span class="badge">Fiches pays</span>
      <div class="row">
        <select id="countrySelect" style="min-width:260px"></select>
        <button class="primary" id="loadCountryBtn">Charger la fiche</button>
      </div>
    </div>
    <div class="bd" id="countryCard"></div>
  </section>
</main>

<script>
const $ = s => document.querySelector(s);
const escapeHtml = s => (s ?? "").toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const list = arr => `<ul>${(arr||[]).map(v => `<li>${escapeHtml(v)}</li>`).join("")}</ul>`;

const CONTINENTS = ["Europe", "Amériques", "Asie", "Afrique", "Moyen-Orient", "Monde"];
const SOURCE_CONTINENT = { bbc_world:"Monde", bbc_sci:"Monde", guardian_world:"Europe", guardian_tech:"Europe", france24:"Europe" };

let SOURCES = [];
let selectedContinents = new Set(CONTINENTS);
let selected = new Set();
let ITEMS = [];
let COUNTRIES = [];

function setStatus(text){ $("#status").textContent = text; }

async function loadSources(){
  const r = await fetch("/api/sources");
  SOURCES = await r.json();
  syncSelectedSources();
  renderContinentFilters();
  renderSourceToggles();
}

function syncSelectedSources(){
  selected = new Set(SOURCES.filter(s => s.enabledByDefault && selectedContinents.has(SOURCE_CONTINENT[s.key] || "Monde")).map(s => s.key));
}

function renderContinentFilters(){
  const root = $("#continentFilters");
  root.innerHTML = CONTINENTS.map(c => `<label class="filter"><input type="checkbox" data-continent="${escapeHtml(c)}" ${selectedContinents.has(c)?"checked":""}/> ${escapeHtml(c)}</label>`).join("");
  root.querySelectorAll("input").forEach(cb => cb.addEventListener("change", e => {
    const c = e.target.getAttribute("data-continent");
    if(e.target.checked) selectedContinents.add(c); else selectedContinents.delete(c);
    syncSelectedSources();
    renderSourceToggles();
  }));
}

function renderSourceToggles(){
  const root = $("#sourceToggles");
  root.innerHTML = SOURCES.filter(s => selectedContinents.has(SOURCE_CONTINENT[s.key] || "Monde")).map(s => `<label class="src"><input type="checkbox" data-key="${escapeHtml(s.key)}" ${selected.has(s.key)?"checked":""}/> ${escapeHtml(s.name)}</label>`).join("");
  root.querySelectorAll("input").forEach(cb => cb.addEventListener("change", e => {
    const k = e.target.getAttribute("data-key");
    if(e.target.checked) selected.add(k); else selected.delete(k);
  }));
}

async function search(){
  const q = $("#q").value.trim();
  if(selected.size === 0){ setStatus("Choisis au moins 1 source"); return; }
  setStatus("Recherche…");
  $("#count").textContent = "";
  const keys = Array.from(selected).join(",");
  const r = await fetch(`/api/search?q=${encodeURIComponent(q)}&sources=${encodeURIComponent(keys)}`);
  const data = await r.json();
  if(data.error){ setStatus("Erreur"); $("#articles").innerHTML = `<div class="small">${escapeHtml(data.error)}</div>`; return; }
  ITEMS = data.items || [];
  setStatus(`Résultats pour: ${q || "tout"}`);
  $("#count").textContent = `${ITEMS.length} item(s)`;
  renderArticles();
}

function renderArticles(){
  const root = $("#articles");
  root.innerHTML = ITEMS.map(it => `
    <article>
      <h3><a href="${escapeHtml(it.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(it.title)}</a></h3>
      <div class="meta"><span>${escapeHtml(it.sourceName)}</span><span>•</span><span>${escapeHtml(it.pubDate ? new Date(it.pubDate).toLocaleString("fr-FR") : "")}</span></div>
      <div class="snippet">${escapeHtml(it.snippet || "")}</div>
    </article>
  `).join("") || `<div class="small">Aucun résultat.</div>`;
}

async function loadCountries(){
  const r = await fetch('/api/countries');
  const data = await r.json();
  COUNTRIES = data.countries || [];
  const select = $('#countrySelect');
  select.innerHTML = COUNTRIES.map(c => `<option value="${escapeHtml(c.name)}">${escapeHtml(c.name)}</option>`).join('');
  const preferred = ['Peru','France','Japan'];
  const first = preferred.find(p => COUNTRIES.some(c => c.name === p)) || (COUNTRIES[0] && COUNTRIES[0].name);
  if(first){ select.value = first; await loadCountryProfile(first); }
}

async function loadCountryProfile(country){
  const r = await fetch(`/api/country-profile?country=${encodeURIComponent(country)}`);
  const data = await r.json();
  if(data.error){ $('#countryCard').innerHTML = `<div class="small">${escapeHtml(data.error)}</div>`; return; }
  renderCountryProfile(data);
}

function renderCountryProfile(country){
  $('#countryCard').innerHTML = `
    <article>
      <h3>1. Nom du pays — ${escapeHtml(country.country)}</h3>
      <dl class="country-fields">
        <dt>2. Date de mise à jour</dt><dd>${escapeHtml(country.updated_at)}</dd>
        <dt>3. Niveau de risque global</dt><dd>${escapeHtml(country.risk_global)} (score ${escapeHtml(country.risk_score)}/5)</dd>
        <dt>4. Baromètre des risques (1 à 5)</dt>
        <dd>
          Géopolitique: ${escapeHtml(country.barometer?.geopolitique)} / 5<br/>
          Politique: ${escapeHtml(country.barometer?.politique)} / 5<br/>
          Socio-économique: ${escapeHtml(country.barometer?.socio_economique)} / 5<br/>
          Criminalité: ${escapeHtml(country.barometer?.criminalite)} / 5<br/>
          Terrorisme: ${escapeHtml(country.barometer?.terrorisme)} / 5<br/>
          Sanitaire & catastrophes: ${escapeHtml(country.barometer?.sanitaire_catastrophes)} / 5<br/>
          Déplacements: ${escapeHtml(country.barometer?.deplacements)} / 5
        </dd>
        <dt>5. Situation sécuritaire globale</dt><dd>${escapeHtml(country.security_overview)}</dd>
        <dt>6. Risques principaux</dt><dd>${list(country.main_risks)}</dd>
        <dt>7. Données clés</dt><dd>${list(Object.entries(country.key_data||{}).map(([k,v])=>`${k}: ${v}`))}</dd>
        <dt>8. Zones à risques</dt><dd>${list(country.risk_zones)}</dd>
        <dt>9. Contexte – derniers événements</dt><dd>${escapeHtml(country.context)}</dd>
        <dt>10. Prochaines échéances</dt><dd>${list(country.next_milestones)}</dd>
        <dt>11. Analyse détaillée par catégorie</dt>
        <dd>
          ${Object.entries(country.category_analysis||{}).map(([k,v]) => `<span class="section-title">${escapeHtml(k)}</span><br/>${escapeHtml(v)}`).join('<br/>')}
        </dd>
        <dt>12. Bonnes pratiques</dt><dd>${list(Object.entries(country.best_practices||{}).map(([k,v])=>`${k}: ${v}`))}</dd>
        <dt>13. Dates importantes</dt><dd>${list(country.important_dates)}</dd>
        <dt>14. Analyse par zones</dt><dd>${list(Object.entries(country.zone_analysis||{}).map(([k,v])=>`${k}: ${v}`))}</dd>
      </dl>
    </article>
  `;
}

$('#searchBtn').addEventListener('click', search);
$('#q').addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); search(); } });
$('#loadCountryBtn').addEventListener('click', () => loadCountryProfile($('#countrySelect').value));
$('#countrySelect').addEventListener('change', e => loadCountryProfile(e.target.value));

Promise.all([loadSources(), loadCountries()]).then(() => setStatus('Prêt')).catch(err => setStatus(`Erreur init: ${err.message}`));
</script>
</body>
</html>
