<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moteur d’actualité — recherche par mots-clés</title>
  <style>
    :root{--bg:#0b0f17;--card:#121a29;--text:#e7ecf5;--muted:#a9b4c7;--border:rgba(255,255,255,.10);--accent:#6aa6ff}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial;background:linear-gradient(180deg,#070a12,#0b0f17);color:var(--text)}
    header{position:sticky;top:0;z-index:10;backdrop-filter:blur(10px);background:rgba(11,15,23,.75);border-bottom:1px solid var(--border)}
    .wrap{max-width:1100px;margin:0 auto;padding:12px 16px}
    h1{margin:0;font-size:20px;letter-spacing:.02em;text-align:center}
    main{padding:10px 16px 24px;max-width:1100px;margin:0 auto;display:grid;gap:14px}
    .panel{background:rgba(18,26,41,.75);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .hd{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .bd{padding:12px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .searchbar{justify-content:center;width:100%;padding-top:2px}
    input,button{background:#0c1220;color:var(--text);border:1px solid var(--border);padding:10px 11px;border-radius:12px;font:inherit}
    button{cursor:pointer}
    button.primary{background:linear-gradient(180deg,rgba(106,166,255,.25),rgba(106,166,255,.12));border-color:rgba(106,166,255,.35)}
    .badge{font-size:12px;color:var(--muted);border:1px solid var(--border);padding:6px 10px;border-radius:999px}
    .filters{display:flex;flex-wrap:wrap;gap:8px;padding-bottom:8px}
    .filter{font-size:13px;color:var(--muted);display:flex;gap:6px;align-items:center}
    .articles{display:grid;gap:10px}
    article{background:rgba(12,18,32,.6);border:1px solid var(--border);border-radius:14px;padding:12px}
    article h3{margin:0 0 6px 0;font-size:15px;line-height:1.25}
    .meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;color:var(--muted);font-size:12px}
    .snippet{margin-top:8px;color:#d7def0;line-height:1.45;font-size:14px}
    a{color:#cfe1ff}
    .small{font-size:12px;color:var(--muted);line-height:1.35}
    .sources{display:flex;flex-wrap:wrap;gap:10px}
    .src{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--muted)}
    .country-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px}
    .country-card{background:rgba(12,18,32,.6);border:1px solid var(--border);border-radius:14px;padding:12px}
    .country-card h3{margin:0 0 10px 0;font-size:16px}
    .country-fields{display:grid;gap:7px;font-size:13px;line-height:1.35}
    .country-fields dt{font-weight:700;color:#cfe1ff}
    .country-fields dd{margin:2px 0 8px;color:#d7def0}
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>AGORAFLUX</h1>
  </div>
</header>

<main>
  <section class="panel">
    <div class="hd">
      <div class="row">
        <span class="badge" id="status">Prêt</span>
        <span class="small" id="count"></span>
      </div>
      <div class="row searchbar">
        <input id="q" type="search" placeholder='Ex: Groenland | cybersécurité | OTAN arctique' style="min-width:360px; width:min(640px, 100%)"/>
        <button class="primary" id="searchBtn">Rechercher</button>
      </div>
    </div>

    <div class="bd">
      <div class="filters" id="continentFilters"></div>
      <div class="sources" id="sourceToggles"></div>
      <div style="height:10px"></div>
      <div class="articles" id="articles"></div>
    </div>
  </section>

  <section class="panel">
    <div class="hd">
      <span class="badge">Fiches pays</span>
    </div>
    <div class="bd">
      <div class="country-grid" id="countryCards"></div>
    </div>
  </section>
</main>

<script>
  const $ = s => document.querySelector(s);
  const escapeHtml = s => (s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const CONTINENTS = ["Europe", "Amériques", "Asie", "Afrique", "Moyen-Orient", "Monde"];
  const SOURCE_CONTINENT = {
    bbc_world: "Monde",
    bbc_sci: "Monde",
    guardian_world: "Europe",
    guardian_tech: "Europe",
    france24: "Europe"
  };

  const COUNTRY_PROFILES = [
    {
      nom: "France",
      capitale: "Paris",
      population: "~68,4 M",
      monnaie: "Euro (EUR)",
      langues: "Français",
      economie: "Économie diversifiée (services, industrie, aéronautique, luxe) avec forte base d’infrastructures et d’innovation.",
      secteurs: "Aéronautique-défense, énergie, numérique, santé, agroalimentaire, luxe",
      opportunites: "Relocalisation industrielle, transition énergétique, cybersécurité, IA appliquée aux services publics et entreprises.",
      risques: "Pression fiscale, complexité réglementaire, tension sur certains coûts salariaux et énergétiques.",
      relations: "Moteur politique de l’UE, coopération étroite avec l’Allemagne, rôle central en Afrique francophone et dans l’OTAN.",
      resume: "Marché mature à fort pouvoir d’achat, pertinent pour des stratégies premium, B2B avancé et partenariats institutionnels."
    },
    {
      nom: "Royaume-Uni",
      capitale: "Londres",
      population: "~68 M",
      monnaie: "Livre sterling (GBP)",
      langues: "Anglais",
      economie: "Économie de services à forte profondeur financière, écosystème tech dynamique, politique commerciale post-Brexit en ajustement.",
      secteurs: "Finance, fintech, médias, santé, cybersécurité, recherche universitaire",
      opportunites: "Entrée rapide sur marchés anglophones, partenariats fintech, services à forte valeur ajoutée.",
      risques: "Volatilité réglementaire liée au Brexit, inflation de certains coûts, disparités régionales.",
      relations: "Coopération forte avec la France en défense et nucléaire civil; relation pragmatique avec l’UE sur commerce et sécurité.",
      resume: "Hub international idéal pour l’expansion anglophone, avec vigilance réglementaire et coûts d’implantation."
    },
    {
      nom: "États-Unis",
      capitale: "Washington, D.C.",
      population: "~335 M",
      monnaie: "Dollar américain (USD)",
      langues: "Anglais (de facto)",
      economie: "Première économie mondiale, forte profondeur de marché, leadership technologique et financier.",
      secteurs: "Tech/IA, défense, santé, énergie, cloud, biotechnologies",
      opportunites: "Hypercroissance sur niches B2B, accès au capital, marchés publics fédéraux et étatiques.",
      risques: "Concurrence très élevée, coûts d’acquisition client, fragmentation réglementaire par État.",
      relations: "Partenaire stratégique majeur de l’Europe en sécurité, commerce et innovation, avec frictions sectorielles ponctuelles.",
      resume: "Marché incontournable pour scaler rapidement; succès conditionné par une exécution commerciale et juridique rigoureuse."
    },
    {
      nom: "Canada",
      capitale: "Ottawa",
      population: "~41 M",
      monnaie: "Dollar canadien (CAD)",
      langues: "Anglais, Français",
      economie: "Économie stable et ouverte, fortement intégrée aux États-Unis, bonne prévisibilité institutionnelle.",
      secteurs: "Énergie, mines, services financiers, IA, aéronautique, agri-tech",
      opportunites: "Entrée nord-américaine progressive, projets cleantech, marchés publics et collaborations universitaires.",
      risques: "Taille de marché limitée vs USA, dépendance cyclique aux matières premières.",
      relations: "Relation constructive avec l’UE via CETA; coopération soutenue avec la France (Québec, recherche, culture).",
      resume: "Plateforme fiable pour se développer en Amérique du Nord avec risque maîtrisé et environnement pro-innovation."
    },
    {
      nom: "Allemagne",
      capitale: "Berlin",
      population: "~84,5 M",
      monnaie: "Euro (EUR)",
      langues: "Allemand",
      economie: "Pilier industriel européen, forte base exportatrice, transition en cours sur énergie et numérique.",
      secteurs: "Automobile, machine-outil, chimie, industrie 4.0, énergies renouvelables",
      opportunites: "Solutions B2B industrielles, efficacité énergétique, automatisation, cybersécurité OT.",
      risques: "Conjoncture manufacturière sensible aux cycles mondiaux et aux coûts énergétiques.",
      relations: "Partenaire prioritaire de la France dans l’UE; coordination structurante sur politique économique européenne.",
      resume: "Marché clé pour offres industrielles robustes, avec besoin d’approche locale et excellence opérationnelle."
    },
    {
      nom: "Japon",
      capitale: "Tokyo",
      population: "~124 M",
      monnaie: "Yen (JPY)",
      langues: "Japonais",
      economie: "Économie avancée à forte intensité technologique, acteurs industriels mondiaux, demande de qualité élevée.",
      secteurs: "Robotique, électronique, automobile, santé, matériaux avancés",
      opportunites: "Partenariats technologiques long terme, produits premium, coopération R&D.",
      risques: "Barrières culturelles d’entrée, cycles de décision longs, forte exigence qualité/conformité.",
      relations: "Partenariat stratégique UE-Japon (EPA), coopération croissante avec la France en innovation et défense.",
      resume: "Marché exigeant mais durable, favorable aux entreprises différenciées par qualité et fiabilité."
    },
    {
      nom: "Inde",
      capitale: "New Delhi",
      population: "~1,43 Md",
      monnaie: "Roupie indienne (INR)",
      langues: "Hindi, Anglais (administration), langues régionales",
      economie: "Croissance rapide, numérisation massive, montée en puissance manufacturière et services IT.",
      secteurs: "IT services, pharma, infrastructures, énergie, électronique, e-commerce",
      opportunites: "Marchés digitaux vastes, partenariats industriels, externalisation qualifiée, defense-tech.",
      risques: "Complexité réglementaire fédérale/étatique, hétérogénéité logistique, pression concurrentielle locale.",
      relations: "Relation stratégique renforcée avec la France (défense, spatial, énergie) et coopération croissante avec l’UE.",
      resume: "Marché de croissance prioritaire, à aborder avec stratégie régionale et partenaires locaux solides."
    },
    {
      nom: "Émirats arabes unis",
      capitale: "Abou Dabi",
      population: "~10 M",
      monnaie: "Dirham des Émirats (AED)",
      langues: "Arabe (officielle), Anglais (business)",
      economie: "Hub régional commerce-finance-logistique, diversification active hors hydrocarbures.",
      secteurs: "Logistique, finance, énergie, construction, tourisme premium, technologies smart city",
      opportunites: "Base régionale MENA, grands projets publics, marchés B2B internationaux.",
      risques: "Concurrence internationale intense, dépendance partielle à la conjoncture énergétique régionale.",
      relations: "Partenariat étroit avec la France en défense, culture, énergie et infrastructures.",
      resume: "Point d’entrée stratégique pour Moyen-Orient/Afrique avec exécution rapide et approche relationnelle forte."
    }
  ];

  let SOURCES = [];
  let selectedContinents = new Set(CONTINENTS);
  let selected = new Set();
  let ITEMS = [];

  async function loadSources(){
    const r = await fetch("/api/sources");
    SOURCES = await r.json();
    syncSelectedSources();
    renderContinentFilters();
    renderSourceToggles();
    setStatus("Prêt");
  }

  function syncSelectedSources(){
    selected = new Set(
      SOURCES
        .filter(s => s.enabledByDefault && selectedContinents.has(SOURCE_CONTINENT[s.key] || "Monde"))
        .map(s => s.key)
    );
  }

  function renderContinentFilters(){
    const root = $("#continentFilters");
    root.innerHTML = CONTINENTS.map(c => `
      <label class="filter">
        <input type="checkbox" data-continent="${escapeHtml(c)}" ${selectedContinents.has(c) ? "checked" : ""}/>
        ${escapeHtml(c)}
      </label>
    `).join("");

    root.querySelectorAll("input[type=checkbox]").forEach(cb => {
      cb.addEventListener("change", e => {
        const continent = e.target.getAttribute("data-continent");
        if (e.target.checked) selectedContinents.add(continent);
        else selectedContinents.delete(continent);
        syncSelectedSources();
        renderSourceToggles();
      });
    });
  }

  function renderSourceToggles(){
    const root = $("#sourceToggles");
    root.innerHTML = SOURCES
    .filter(s => selectedContinents.has(SOURCE_CONTINENT[s.key] || "Monde"))
    .map(s => `
      <label class="src">
        <input type="checkbox" data-key="${escapeHtml(s.key)}" ${selected.has(s.key) ? "checked":""}/>
        ${escapeHtml(s.name)}
      </label>
    `).join("");
    root.querySelectorAll("input[type=checkbox]").forEach(cb=>{
      cb.addEventListener("change", e=>{
        const k = e.target.getAttribute("data-key");
        if(e.target.checked) selected.add(k); else selected.delete(k);
      });
    });
  }

  function setStatus(text){ $("#status").textContent = text; }

  async function search(){
    const q = $("#q").value.trim();
    if(selected.size === 0){
      setStatus("Choisis au moins 1 source");
      return;
    }
    setStatus("Recherche…");
    $("#count").textContent = "";

    const keys = Array.from(selected).join(",");
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}&sources=${encodeURIComponent(keys)}`);
    const data = await r.json();

    if(data.error){
      setStatus("Erreur");
      $("#articles").innerHTML = `<div class="small">${escapeHtml(data.error)} ${escapeHtml(data.details||"")}</div>`;
      return;
    }

    ITEMS = data.items || [];
    setStatus(`Résultats pour: ${q || "tout"}`);
    $("#count").textContent = `${ITEMS.length} item(s)`;
    renderArticles();
  }

  function renderArticles(){
    const root = $("#articles");
    root.innerHTML = ITEMS.map(it => `
      <article>
        <h3><a href="${escapeHtml(it.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(it.title)}</a></h3>
        <div class="meta">
          <span>${escapeHtml(it.sourceName)}</span>
          <span>•</span>
          <span>${escapeHtml(it.pubDate ? new Date(it.pubDate).toLocaleString("fr-FR") : "")}</span>
        </div>
        <div class="snippet">${escapeHtml(it.snippet || "")}</div>
      </article>
    `).join("") || `<div class="small">Aucun résultat. Essaie un autre mot-clé (ex: “arctic”, “nato”, “ransomware”).</div>`;
  }

  function renderCountryCards(){
    const root = $("#countryCards");
    root.innerHTML = COUNTRY_PROFILES.map(country => `
      <article class="country-card">
        <h3>${escapeHtml(country.nom)}</h3>
        <dl class="country-fields">
          <dt>Capitale</dt><dd>${escapeHtml(country.capitale)}</dd>
          <dt>Population</dt><dd>${escapeHtml(country.population)}</dd>
          <dt>Monnaie</dt><dd>${escapeHtml(country.monnaie)}</dd>
          <dt>Langue(s) officielle(s)</dt><dd>${escapeHtml(country.langues)}</dd>
          <dt>Situation économique</dt><dd>${escapeHtml(country.economie)}</dd>
          <dt>Secteurs clés</dt><dd>${escapeHtml(country.secteurs)}</dd>
          <dt>Opportunités business</dt><dd>${escapeHtml(country.opportunites)}</dd>
          <dt>Risques / points d’attention</dt><dd>${escapeHtml(country.risques)}</dd>
          <dt>Relations avec la France / l’Europe (si pertinent)</dt><dd>${escapeHtml(country.relations)}</dd>
          <dt>Résumé stratégique</dt><dd>${escapeHtml(country.resume)}</dd>
        </dl>
      </article>
    `).join("");
  }

  $("#searchBtn").addEventListener("click", search);
  $("#q").addEventListener("keydown", e => {
    if(e.key === "Enter"){ e.preventDefault(); search(); }
  });

  renderCountryCards();
  loadSources();
</script>
</body>
</html>
