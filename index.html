<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AGORAFLUX</title>
  <style>
    :root{--bg:#cfe8d1;--card:#121a29;--text:#e7ecf5;--muted:#a9b4c7;--border:rgba(255,255,255,.10);--accent:#6aa6ff;--glow:rgba(106,166,255,.25);--map-image:url("https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg")}
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial;
      color:var(--text);
      background:
        radial-gradient(900px 480px at 10% -10%, rgba(106,166,255,.18), transparent 60%),
        radial-gradient(700px 420px at 90% 0%, rgba(106,166,255,.12), transparent 60%),
        linear-gradient(180deg,#d8f0d9,#bfe1c3);
      background-attachment: fixed;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:var(--map-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.5;
      filter: contrast(1.08) saturate(1.05);
      pointer-events: none;
      z-index: -1;
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:radial-gradient(1200px 700px at 50% 40%, rgba(255,255,255,.08), rgba(12,18,32,.32));
      pointer-events:none;
      z-index:-1;
    }
    header{position:sticky;top:0;z-index:10;backdrop-filter:blur(10px);background:rgba(11,15,23,.75);border-bottom:1px solid var(--border)}
    .wrap{max-width:1100px;margin:0 auto;padding:10px 16px}
    h1{margin:0;font-size:18px}
    main{display:grid;grid-template-columns:.45fr 1.75fr;gap:12px;padding:8px 16px 24px;max-width:1200px;margin:0 auto}
    @media(max-width:1080px){main{grid-template-columns:1fr}}
    .panel{background:rgba(18,26,41,.45);border:1px solid rgba(255,255,255,.14);border-radius:16px;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,.25);backdrop-filter:blur(6px)}
    .hd{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid var(--border);flex-wrap:wrap}
    .bd{padding:12px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    input,textarea,button{background:#0c1220;color:var(--text);border:1px solid var(--border);padding:10px 11px;border-radius:12px;font:inherit}
    button{cursor:pointer}
    button.primary{background:linear-gradient(180deg,rgba(106,166,255,.25),rgba(106,166,255,.12));border-color:rgba(106,166,255,.35);box-shadow:0 10px 20px rgba(106,166,255,.15)}
    .badge{font-size:12px;color:var(--muted);border:1px solid var(--border);padding:6px 10px;border-radius:999px}
    .articles{display:grid;gap:10px}
    article{background:rgba(12,18,32,.38);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:12px}
    article h3{margin:0 0 6px 0;font-size:15px;line-height:1.25}
    .idx{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;border-radius:999px;background:rgba(106,166,255,.15);border:1px solid rgba(106,166,255,.35);color:#cfe1ff;font-size:12px;margin-right:8px}
    .meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;color:var(--muted);font-size:12px}
    .tag{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.2px;border:1px solid transparent}
    .tag-geo{background:rgba(103,194,255,.18);color:#cfe9ff;border-color:rgba(103,194,255,.35)}
    .tag-finance{background:rgba(255,107,107,.18);color:#ffd6d6;border-color:rgba(255,107,107,.35)}
    .tag-security{background:rgba(255,183,77,.2);color:#ffe0b2;border-color:rgba(255,183,77,.35)}
    .tag-health{background:rgba(76,217,138,.18);color:#d2f6e3;border-color:rgba(76,217,138,.35)}
    .tag-sport{background:rgba(120,190,255,.2);color:#d7ecff;border-color:rgba(120,190,255,.35)}
    .tag-politics{background:rgba(255,150,84,.2);color:#ffe2cc;border-color:rgba(255,150,84,.35)}
    .tag-general{background:rgba(163,177,198,.18);color:#e7ecf5;border-color:rgba(163,177,198,.35)}
    .snippet{margin-top:8px;color:#d7def0;line-height:1.45;font-size:14px}
    a{color:#cfe1ff}
    .small{font-size:12px;color:var(--muted);line-height:1.35}
    .sources{display:flex;flex-wrap:wrap;gap:10px}
    .src{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--muted)}
    .toggle{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--muted);background:rgba(12,18,32,.6);border:1px solid var(--border);padding:6px 10px;border-radius:999px}
    .source-actions{display:flex;gap:8px;flex-wrap:wrap}
    .ghost{background:transparent;border:1px dashed var(--border);color:var(--muted)}
    .idx{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;border-radius:999px;background:rgba(106,166,255,.15);border:1px solid rgba(106,166,255,.35);color:#cfe1ff;font-size:12px;margin-right:8px}
    .bg-input{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .bg-input input{min-width:240px;flex:1}
    .bg-input .note{flex-basis:100%}
    .continents{position:sticky;top:90px;align-self:start}
    .tablist{display:flex;flex-direction:column;gap:8px}
    .tablist button{width:100%;text-align:left;border-radius:12px;background:rgba(12,18,32,.38);border:1px solid rgba(255,255,255,.14);padding:10px 12px}
    .tablist button.active{border-color:rgba(106,166,255,.55);background:rgba(106,166,255,.15);color:#cfe1ff}
    .tablist .small{margin-top:6px}
    .country-slider{display:flex;gap:10px;overflow:auto;padding-bottom:6px}
    .country-slider.hidden{display:none;pointer-events:none}
    .country-slider button{white-space:nowrap;border-radius:999px;background:rgba(12,18,32,.38);border:1px solid rgba(255,255,255,.14);padding:6px 10px;font-size:12px}
    .country-slider button.active{border-color:rgba(106,166,255,.55);background:rgba(106,166,255,.15);color:#cfe1ff}
    .country-picker{margin-top:8px;display:none;flex-direction:column;gap:8px}
    .country-picker.open{display:flex}
    .country-picker input{width:100%}
    .country-list{display:flex;flex-wrap:wrap;gap:8px}
    .country-list button{border-radius:999px;background:rgba(12,18,32,.38);border:1px solid rgba(255,255,255,.14);padding:6px 10px;font-size:12px}

    .continent-country-panel{margin-top:10px;padding:10px;border:1px solid var(--border);border-radius:12px;background:rgba(12,18,32,.3)}
    .continent-country-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
    .continent-country-tools input{max-width:320px;flex:1}
    .continent-country-grid{display:flex;flex-wrap:wrap;gap:8px}
    .continent-country-grid button{border-radius:999px;background:rgba(12,18,32,.38);border:1px solid rgba(255,255,255,.14);padding:6px 10px;font-size:12px}
    .placeholder{padding:12px;border:1px dashed var(--border);border-radius:12px;color:var(--muted);background:rgba(12,18,32,.25)}
    .ratings{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
    .rating-card{background:rgba(12,18,32,.38);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:10px}
    .rating-title{font-size:12px;color:var(--muted)}
    .rating-score{font-size:18px;font-weight:700}
    .rating-note{font-size:11px;color:var(--muted);margin-top:4px}
    .category-section{margin-top:14px}
    .category-section h4{margin:0 0 8px 0;font-size:14px}
    .advice{margin-top:10px;font-size:12px;color:var(--muted);line-height:1.4}
    .facts{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-top:12px}
    .fact-card{background:rgba(12,18,32,.38);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:10px}
    .fact-title{font-size:12px;color:var(--muted)}
    .fact-value{font-size:14px;font-weight:600;margin-top:4px}
    .fact-note{font-size:11px;color:var(--muted);margin-top:6px;grid-column:1/-1}
    .fact-link{grid-column:1/-1;display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;border:1px solid rgba(106,166,255,.4);background:rgba(106,166,255,.16);color:#dce9ff;font-size:13px;text-decoration:none;width:fit-content}
    .fact-link:hover{background:rgba(106,166,255,.24)}

    #live-news-ticker{max-width:1200px;margin:8px auto 0;padding:8px 16px;overflow:hidden;white-space:nowrap;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:rgba(11,15,23,.68);backdrop-filter:blur(8px)}
    #live-news-ticker .ticker-content{display:inline-block;min-width:100%;padding-left:100%;animation:liveTickerScroll 45s linear infinite}
    #live-news-ticker a{color:#dce9ff;text-decoration:none;margin-right:16px}
    #live-news-ticker a:hover{text-decoration:underline}
    @keyframes liveTickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <h1 id="siteName">AGORAFLUX</h1>
      </div>
</header>

<div id="live-news-ticker"><div class="ticker-content" id="liveNewsContent">Chargement des actualités…</div></div>

<main>
  <aside class="panel continents">
    <div class="hd">
      <div class="row">
        <span class="badge">Continents</span>
        <span class="small">onglets</span>
      </div>
    </div>
    <div class="bd">
      <div class="tablist" id="continentTabs"></div>
    </div>
  </aside>

  <section class="panel">
    <div class="hd">
      <div class="row">
        <span class="badge" id="status">Prêt</span>
        <span class="small" id="count"></span>
      </div>
      <div class="row" style="justify-content:center;width:100%">
        <input id="q" type="search" placeholder='Rechercher: ex. Trump' style="min-width:420px;max-width:760px;flex:1"/>
        <button class="primary" id="searchBtn">Rechercher</button>
      </div>
    </div>

    <div class="bd">
      <div class="row source-actions">
        <button class="ghost" id="selectAll">Tout sélectionner</button>
        <button class="ghost" id="clearAll">Tout désélectionner</button>
        <label class="toggle">
          <input type="checkbox" id="toggleSources" checked />
          Afficher les sources
        </label>
      </div>
      <div style="height:10px"></div>
      <div class="sources" id="sourceToggles"></div>
      <div style="height:10px"></div>
      <div class="articles" id="articles"></div>
    </div>
  </section>

</main>

<script>
  const $ = s => document.querySelector(s);
  const SITE_NAME = "AGORAFLUX";
  document.title = SITE_NAME;
  const siteNameEl = $("#siteName");
  if(siteNameEl) siteNameEl.textContent = SITE_NAME;
  const escapeHtml = s => (s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const norm = s => (s||"").toLowerCase().normalize("NFD").replace(/\p{Diacritic}/gu,"").replace(/[^a-z0-9\\s-]/g," ").replace(/\\s+/g," ").trim();
  const tokenize = s => norm(s).split(" ").filter(t=>t.length>=2);
  const COUNTRY_TRANSLATIONS = {
    "Germany": "Allemagne",
    "United States": "États-Unis",
    "United Kingdom": "Royaume-Uni",
    "Spain": "Espagne",

  let SOURCES = [];
  let selected = new Set();
  let ITEMS = [];
  const translationCache = {};
  let liveNewsTimer = null;
  let activeContinent = "global";
  let activeCountry = null;
  let activeEntity = null;
  let continentCountryFilter = "";
  let SEARCH_INDEX = { countries: [], continents: [] };
  const CONTINENTS = [

    "South Africa": "ZA",

    Morocco: "MA",
    Ghana: "GH",

    Pakistan: "PK",

    Ukraine: "UA",

  const LEADER_PARTY_FALLBACK = {
    Nigeria: { headOfState: "Bola Tinubu", rulingParty: "All Progressives Congress" },
    "South Africa": { headOfState: "Cyril Ramaphosa", rulingParty: "African National Congress" },
    Kenya: { headOfState: "William Ruto", rulingParty: "United Democratic Alliance" },
    Egypt: { headOfState: "Abdel Fattah al-Sissi", rulingParty: "Nation's Future Party" },
    Morocco: { headOfState: "Mohammed VI", rulingParty: "Rassemblement national des indépendants" },
    Ghana: { headOfState: "Nana Akufo-Addo", rulingParty: "New Patriotic Party" },
    Senegal: { headOfState: "Bassirou Diomaye Faye", rulingParty: "Pastef" },
    "United States": { headOfState: "Donald Trump", rulingParty: "Parti républicain" },
    Canada: { headOfState: "Mark Carney", rulingParty: "Parti libéral du Canada", primeMinister: "Mark Carney", governor: "Mary Simon" },

    China: { headOfState: "Xi Jinping", rulingParty: "Parti communiste chinois" },
    India: { headOfState: "Droupadi Murmu", rulingParty: "Bharatiya Janata Party", primeMinister: "Narendra Modi" },

    "South Korea": { headOfState: "Yoon Suk Yeol", rulingParty: "People Power Party" },
    Indonesia: { headOfState: "Prabowo Subianto", rulingParty: "Coalition Indonésie avancée" },
    Pakistan: { headOfState: "Asif Ali Zardari", rulingParty: "Pakistan Muslim League (N)", primeMinister: "Shehbaz Sharif" },
    France: { headOfState: "Emmanuel Macron", rulingParty: "Renaissance" },
    Germany: { headOfState: "Frank-Walter Steinmeier", rulingParty: "SPD", primeMinister: "Olaf Scholz" },
    "United Kingdom": { headOfState: "Charles III", rulingParty: "Labour Party", primeMinister: "Keir Starmer" },
    Italy: { headOfState: "Sergio Mattarella", rulingParty: "Fratelli d'Italia", primeMinister: "Giorgia Meloni" },
    Spain: { headOfState: "Felipe VI", rulingParty: "PSOE", primeMinister: "Pedro Sánchez" },
    Ukraine: { headOfState: "Volodymyr Zelensky", rulingParty: "Serviteur du peuple", primeMinister: "Denys Chmyhal" },
    Russia: { headOfState: "Vladimir Poutine", rulingParty: "Russie unie", primeMinister: "Mikhaïl Michoustine" },
    Australia: { headOfState: "Charles III", rulingParty: "Australian Labor Party", primeMinister: "Anthony Albanese", governor: "Sam Mostyn" },
    "New Zealand": { headOfState: "Charles III", rulingParty: "New Zealand National Party", primeMinister: "Christopher Luxon", governor: "Cindy Kiro" }
  };

  const FALLBACK_RATINGS = {
    security: 3,
    external: 3,
    health: 3,
    geography: 3,
    politics: 3
  };

  let COUNTRY_PROFILES = {};
  let countryProfilesLoaded = false;

  async function loadSources(){
    const r = await fetch("/api/sources");
    SOURCES = await r.json();
  }

  async function loadCountryProfiles(){
    const buildLocalProfiles = () => {
      const allCountries = Object.keys(COUNTRY_CODES);
      const local = {};
      allCountries.forEach(country => {
        local[country] = buildFallbackProfile(country);
      });
      COUNTRY_PROFILES = local;
      countryProfilesLoaded = true;
    };
    try {
      let r = await fetch("/api/country-profiles");
      if (!r.ok) {
        await fetch("/api/refresh-country-profiles", { method: "POST" }).catch(() => null);
        r = await fetch("/api/country-profiles");
      }
      const data = await r.json();
      COUNTRY_PROFILES = data.profiles || {};
      if (!Object.keys(COUNTRY_PROFILES).length) {
        buildLocalProfiles();
      } else {
        countryProfilesLoaded = true;
      }
      hydrateCountryMapsFromProfiles();
      return data;
    } catch (e) {
      buildLocalProfiles();
      hydrateCountryMapsFromProfiles();
      setStatus("Données pays chargées en mode local");
      return null;
    }
  }

  function buildFallbackProfile(country){
    const continent = continentByCountry(country) || "Global";
    return {
      country,
      continent,
      headOfState: LEADER_PARTY_FALLBACK[country]?.headOfState || "Chef d’État non publié",
      rulingParty: LEADER_PARTY_FALLBACK[country]?.rulingParty || "Configuration institutionnelle",
      primeMinister: LEADER_PARTY_FALLBACK[country]?.primeMinister || null,
      governor: LEADER_PARTY_FALLBACK[country]?.governor || null,
      nextElection: null,
      isDemocracy: null,
      rsfRank: "Non publié",
      rsfScore: null,
      gdpPerCapita: null,
      ratings: {
        security: FALLBACK_RATINGS.security,
        business: FALLBACK_RATINGS.external,
        health: FALLBACK_RATINGS.health,
        expat: FALLBACK_RATINGS.geography,
        overall: FALLBACK_RATINGS.politics
      }
    };
  }

  function getCountryProfile(country){
    return COUNTRY_PROFILES?.[country] || buildFallbackProfile(country);
  }
  function hydrateCountryMapsFromProfiles(){
    const nextCountries = {};
    const nextCodes = {};
    const all = Object.values(COUNTRY_PROFILES || {});
    all.forEach(profile => {
      const name = profile.country;
      const continent = profile.continent || "Global";
      if (!name) return;
      if (!nextCountries[continent]) nextCountries[continent] = [];
      nextCountries[continent].push(name);
      if (profile.iso2) nextCodes[name] = profile.iso2;
    });
    Object.keys(nextCountries).forEach(continent => {
      nextCountries[continent] = Array.from(new Set(nextCountries[continent])).sort((a, b) => a.localeCompare(b, "fr"));
    });
    if (Object.keys(nextCountries).length) CONTINENT_COUNTRIES = nextCountries;
    if (Object.keys(nextCodes).length) COUNTRY_CODES = { ...COUNTRY_CODES, ...nextCodes };
  }


  async function loadSearchIndex(){
    try {
      const r = await fetch("/api/search-index");
      const data = await r.json();
      SEARCH_INDEX = data || { countries: [], continents: [] };
    } catch (_e) {
      SEARCH_INDEX = { countries: Object.keys(COUNTRY_PROFILES || {}).map(name => ({ name, slug: slugify(name), continent: COUNTRY_PROFILES[name]?.continent || continentByCountry(name) })), continents: CONTINENTS.filter(c => c.key !== "global").map(c => ({ name: c.key, slug: slugify(c.key) })) };
    }
  }

  function buildSearchIndex(){
    return SEARCH_INDEX;
  }

  function slugify(v){
    return norm(v).replace(/\s+/g, "-");
  }

  function translateCountry(name){
    return COUNTRY_TRANSLATIONS[name] || name;
  }

  function detectLanguage(input){
    const text = norm(input || "");
    if (!text) return "und";
    const frenchHints = /\b(le|la|les|des|une|pour|avec|sans|selon|face|contre|actualite|gouvernement)\b/.test(text);
    return frenchHints ? "fr" : "en";
  }

  async function translateToFrench(text, sourceLang = "und"){
    if (!text) return "";
    if (translationCache[text]) return translationCache[text];
    const lang = sourceLang && sourceLang !== "und" ? sourceLang : detectLanguage(text);
    if (lang === "fr") {
      translationCache[text] = text;
      return text;
    }
    try {
      const r = await fetch(`/api/translation-service?q=${encodeURIComponent(text)}&sourceLang=${encodeURIComponent(lang)}`);
      const data = await r.json();
      const translated = data?.text || text;
      translationCache[text] = translated;
      return translated;
    } catch (_e) {
      translationCache[text] = text;
      return text;
    }
  }

  function continentByCountry(country){
    return Object.entries(CONTINENT_COUNTRIES).find(([, list]) => list.includes(country))?.[0] || null;
  }

  function renderContinentTabs(){
    const root = $("#continentTabs");
    root.innerHTML = CONTINENTS.map(c => `
      <button type="button" data-continent="${escapeHtml(c.key)}" class="${c.key === activeContinent ? "active" : ""}">
        ${escapeHtml(c.label)}
      </button>
    `).join("");
    root.querySelectorAll("button").forEach(btn=>{
      btn.addEventListener("click", () => {
        const key = btn.getAttribute("data-continent");
        if(!key) return;
        setContinent(key);
      });
    });
  }

  function setContinent(continent){
    activeContinent = continent;
    activeCountry = null;
    activeEntity = null;
    continentCountryFilter = "";
    const scopedSources = continent === "global"
      ? SOURCES
      : SOURCES.filter(s => s.continent === continent);
    selected = new Set(scopedSources.map(s => s.key));
    const countries = CONTINENT_COUNTRIES[activeContinent] || [];
    if (!countries.includes(activeCountry)) activeCountry = null;
    SidebarCountryTabs();
    renderSourceToggles();
    ContinentPage();
    renderArticles();
  }

  function renderCountrySlider(){
    const slider = $("#countrySlider");
    if (!slider) return;
    const countries = CONTINENT_COUNTRIES[activeContinent] || [];
    if (countries.length === 0){
      slider.innerHTML = "";
      return;
    }
    slider.innerHTML = countries.map(country => `
      <button type="button" data-country="${escapeHtml(country)}" class="${country === activeCountry ? "active" : ""}">
        ${escapeHtml(country)}
      </button>
    `).join("");
    slider.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        const country = btn.getAttribute("data-country");
        if(!country) return;
        setCountry(country);
      });
    });
  }

  function SidebarCountryTabs(){
    renderContinentTabs();
  }

  function ContinentPage(){
    // Interface minimaliste: pas de picker/slider pays.
  }

  function CountrySlider(){
    renderCountrySlider();
  }

  function setCountry(country){
    activeCountry = country;
    activeEntity = null;
    const targetContinent = continentByCountry(country) || activeContinent || "global";
    activeContinent = targetContinent;
    renderCountrySlider();
    renderCountryPicker();
    renderArticles();
  }

  function renderCountryPicker(){
    // Interface minimaliste: picker pays supprimé.
  }

  function initDefaultView(){
    activeContinent = "Europe";
    activeCountry = null;
    activeEntity = null;
    SidebarCountryTabs();
    renderSourceToggles();
    ContinentPage();
    renderArticles();
  }

  function resolveContinent(input){
    if (!input) return null;
    const key = norm(input);
    const map = {
      afrique: "Afrique",
      "amerique-du-nord": "Amérique du Nord",
      "amerique-du-sud": "Amérique du Sud",
      asie: "Asie",
      europe: "Europe",
      oceanie: "Océanie",
      antarctique: "Antarctique",
      global: "global"
    };
    return map[key] || null;
  }

  function resolveCountry(input, continent){
    if (!input) return null;
    const countries = continent === "global"
      ? Object.keys(COUNTRY_CODES)
      : (CONTINENT_COUNTRIES[continent] || []);
    const normalized = norm(input);
    const bySlug = countries.find(country => slugify(country) === normalized.replace(/\s+/g, "-"));
    if (bySlug) return bySlug;
    const byName = countries.find(country => norm(country) === normalized);
    if (byName) return byName;
    const byCode = countries.find(country => norm(COUNTRY_CODES[country] || "") === normalized);
    if (byCode) return byCode;
    return null;
  }

  function renderSourceToggles(){
    const root = $("#sourceToggles");
    const visibleSources = activeContinent === "global"
      ? SOURCES
      : SOURCES.filter(s => s.continent === activeContinent);
    root.innerHTML = visibleSources.map(s => `
      <label class="src">
        <input type="checkbox" data-key="${escapeHtml(s.key)}" ${selected.has(s.key) ? "checked":""}/>
        ${escapeHtml(s.name)}
      </label>
    `).join("");
    root.querySelectorAll("input[type=checkbox]").forEach(cb=>{
      cb.addEventListener("change", e=>{
        const k = e.target.getAttribute("data-key");
        if(e.target.checked) selected.add(k); else selected.delete(k);
      });
    });
  }

  async function renderArticles(){
    const root = $("#articles");
    const visible = ITEMS.filter(item => {
      if (item.sourceKey && selected.size && !selected.has(item.sourceKey)) return false;
      if (activeContinent !== "global" && item.continent && item.continent !== activeContinent) return false;
      return true;
    });

    const cards = await Promise.all(visible.map(async (item, idx) => {
      const translatedTitle = await translateToFrench(item.title || "", item.titleLanguage || item.language_detected || "und");
      return `
      <article>
        <h3><span class="idx">#${idx + 1}</span><a href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(translatedTitle)}</a></h3>
        <div class="meta">
          <span>${escapeHtml(item.source || "")}</span>
          <span>•</span>
          <span>${escapeHtml(item.date ? new Date(item.date).toLocaleString("fr-FR") : "")}</span>
          ${item.continent ? `<span>•</span><span>${escapeHtml(item.continent)}</span>` : ""}
          ${item.country ? `<span>•</span><span>${escapeHtml(translateCountry(item.country))}</span>` : ""}
        </div>
        <div class="snippet">${escapeHtml(item.summary || "")}</div>
      </article>
    `;
    }));

    root.innerHTML = cards.join("") || `<div class="small">Aucun résultat pour ce filtre.</div>`;
  }

  async function fetchLatestNews(){
    const root = $("#liveNewsContent");
    if (!root) return;
    try {
      const r = await fetch('/api/ticker');
      const data = await r.json();
      const items = (data.items || []).slice(0, 20);
      if (!items.length){
        root.textContent = 'Aucune actualité récente.';
        return;
      }
      const links = await Promise.all(items.map(async it => {
        const translated = await translateToFrench(it.title_fr || it.title || '', it.language || 'und');
        return `<a href="${escapeHtml(it.url || '#')}" target="_blank" rel="noopener noreferrer">${escapeHtml(translated)}</a>`;
      }));
      root.innerHTML = links.join('<span> • </span>');
    } catch (_e) {
      root.textContent = 'Flux en direct indisponible.';
    }
  }

  function startLiveNewsTicker(){
    fetchLatestNews();
    if (liveNewsTimer) clearInterval(liveNewsTimer);
    liveNewsTimer = setInterval(fetchLatestNews, 30000);
  }

  function setStatus(text){ $("#status").textContent = text; }

  async function search(){
    const q = $("#q").value.trim();
    const index = buildSearchIndex();
    const qNorm = norm(q);

    // Global tab acts as the main cross-media search engine.
    activeContinent = "global";
    activeCountry = null;
    const continentMatch = index.continents.find(c => norm(c.name) === qNorm || c.slug === qNorm.replace(/\s+/g, "-"));
    if (continentMatch) {
      activeContinent = continentMatch.name;
      activeCountry = null;
      activeEntity = null;
      SidebarCountryTabs();
      renderSourceToggles();
      ContinentPage();
      renderArticles();
      setStatus(`Vue continent: ${continentMatch.name}`);
      return;
    }
    const countryMatch = index.countries.find(c => norm(c.name) === qNorm || c.slug === qNorm.replace(/\s+/g, "-"));
    if (countryMatch) {
      activeContinent = countryMatch.continent || "global";
      activeCountry = countryMatch.name;
      activeEntity = null;
      SidebarCountryTabs();
      renderSourceToggles();
      ContinentPage();
      renderArticles();
      setStatus(`Profil pays: ${translateCountry(countryMatch.name)}`);
      return;
    }
    setStatus("Recherche globale…");
    $("#count").textContent = "";

    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}&sources=all`);
    const data = await r.json();

    if(data.error){
      setStatus("Erreur");
      const details = data.warnings?.length
        ? ` (${data.warnings.length} source(s) en échec)`
        : "";
      $("#articles").innerHTML = `<div class="small">${escapeHtml(data.error)}${escapeHtml(details)} ${escapeHtml(data.details||"")}</div>`;
      return;
    }

    ITEMS = (data.items || []).sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
    activeEntity = q || null;
    selected = new Set(SOURCES.map(s => s.key));
    const warningText = data.warnings?.length
      ? ` — ${data.warnings.length} source(s) en échec`
      : "";
    setStatus(`Résultats pour: ${q || "tout"}${warningText}`);
    $("#count").textContent = `${ITEMS.length} item(s)`;
    renderSourceToggles();
    renderArticles();
  }

  $("#searchBtn").addEventListener("click", search);
  $("#selectAll").addEventListener("click", () => {
    const scope = activeContinent === "global"
      ? SOURCES
      : SOURCES.filter(s => s.continent === activeContinent);
    selected = new Set(scope.map(s => s.key));
    renderSourceToggles();
  });
  $("#clearAll").addEventListener("click", () => {
    const scope = activeContinent === "global"
      ? SOURCES
      : SOURCES.filter(s => s.continent === activeContinent);
    const remaining = new Set(selected);
    scope.forEach(s => remaining.delete(s.key));
    selected = remaining;
    renderSourceToggles();
  });
  $("#toggleSources").addEventListener("change", e => {
    $("#sourceToggles").style.display = e.target.checked ? "flex" : "none";
  });
  $("#q").addEventListener("keydown", e => {
    if(e.key === "Enter"){ e.preventDefault(); search(); }
  });
  async function boot(){
    setStatus("Chargement…");
    await Promise.all([loadSources(), loadCountryProfiles(), loadSearchIndex()]);
    initDefaultView();
    setStatus("Prêt");
  }

  boot();
  startLiveNewsTicker();
</script>
</body>
</html>
