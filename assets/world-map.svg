<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Carte du monde stylisée">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#deefe4"/>
      <stop offset="100%" stop-color="#bcd8c6"/>
    </linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f5f73"/>
      <stop offset="100%" stop-color="#1f4555"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g stroke="#5b8192" stroke-opacity="0.25" stroke-width="1">
    <path d="M0 150H1600M0 300H1600M0 450H1600M0 600H1600M0 750H1600"/>
    <path d="M200 0V900M400 0V900M600 0V900M800 0V900M1000 0V900M1200 0V900M1400 0V900"/>
  </g>

  <g fill="url(#land)" fill-opacity="0.72" stroke="#163742" stroke-opacity="0.5" stroke-width="2" filter="url(#soft)">
    <!-- North America -->
    <path d="M138 176l84-58 112-14 94 29 49 56-4 57-43 27-4 47-49 54-4 45-73 41-89-12-34-52-79-17-43-66 25-61 56-43 2-33z"/>
    <!-- South America -->
    <path d="M456 449l70 34 47 79-16 71 34 86-38 104-53 34-63-54 3-68-30-55 22-95 24-41-15-58z"/>
    <!-- Europe + Asia -->
    <path d="M706 176l95-27 114 4 56 44 83-17 63 33 108 9 99 58 57 67-48 63-95 32-73 64-121 14-71 49-97 6-92-25-52-53 16-52-64-43-49-70 22-57z"/>
    <!-- Africa -->
    <path d="M824 387l79-21 60 47 45 123-18 115-64 94-74 2-66-64-11-88 33-93 30-38-14-77z"/>
    <!-- Oceania -->
    <path d="M1260 602l78-14 43 32 66-8 30 44-28 41-66 8-54-26-57 20-43-34 31-63z"/>
    <path d="M1437 760l34-10 24 23-11 33-34 11-25-23z"/>
    <!-- Greenland -->
    <path d="M468 78l52-33 74 6 38 45-15 50-75 22-49-26-36-31z"/>
  </g>

  <g fill="#ffffff" fill-opacity="0.18" font-family="system-ui,Segoe UI,Arial" font-size="30" font-weight="700">
    <text x="800" y="860" text-anchor="middle">AGORAFLUX • WORLD NEWS</text>
  </g>
</svg>
